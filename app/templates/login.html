{% extends "base.html" %}

{% block title %}Sign In — CollabSpace{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">C</div>
            <span class="auth-logo-text">CollabSpace</span>
        </div>

        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to your workspace</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required placeholder="your_username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary btn-block">Sign in</button>
        </form>

        <div class="auth-footer">
            <a href="#" onclick="showResetForm()">Forgot password?</a>
            <span>·</span>
            <a href="/register">Create account</a>
        </div>

        <div id="resetForm" style="display:none;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border);">
            <p style="font-size:0.875rem;font-weight:600;margin-bottom:0.75rem;">Reset your password</p>
            <form onsubmit="handleReset(event)">
                <div class="form-group">
                    <label for="resetEmail">Email address</label>
                    <input type="email" id="resetEmail" name="email" required placeholder="you@company.com">
                </div>
                <button type="submit" class="btn-secondary" style="width:100%;justify-content:center;">Send reset link</button>
            </form>
        </div>
    </div>
</div>

<script>
function showResetForm() {
    document.getElementById('resetForm').style.display = 'block';
}

async function handleLogin(event) {
    event.preventDefault();
    const formData = new FormData(event.target);
    const data = Object.fromEntries(formData);
    const btn = event.target.querySelector('button[type=submit]');
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await response.json();

        if (response.ok) {
            const params = new URLSearchParams(window.location.search);
            const redirectTo = params.get('next') || '/dashboard';
            window.location.href = redirectTo;
        } else {
            const detail = result.detail;
            const msg = Array.isArray(detail) ? detail.map(e => e.msg).join(', ') : (detail || 'Sign in failed');
            alert(msg);
            btn.disabled = false;
            btn.textContent = 'Sign in';
        }
    } catch (err) {
        alert('Sign in failed: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Sign in';
    }
}

async function handleReset(event) {
    event.preventDefault();
    const formData = new FormData(event.target);
    try {
        const response = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: formData.get('email') })
        });
        const data = await response.json();
        alert(data.message + (data.token ? '\n\nDev token: ' + data.token : ''));
    } catch (err) {
        alert('Request failed: ' + err.message);
    }
}
</script>
{% endblock %}
